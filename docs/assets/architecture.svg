<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Arbiter architecture diagram</title>
  <desc id="desc">A product architecture diagram showing stakers funding a CSPR market, the Arbiter agent paying an x402-style truth endpoint, a Casper settlement contract resolving and settling, and a proof viewer publishing receipt and transaction evidence.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#111111" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlack" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L10 6L1 11" stroke="#171717" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L10 6L1 11" stroke="#4F73FF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L10 6L1 11" stroke="#12875A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #F4F2ED; }
      .paper { fill: #FFFEFA; }
      .ink { fill: #171717; }
      .muted { fill: #696762; }
      .line { stroke: #DCD6CA; }
      .blackLine { stroke: #171717; }
      .blueLine { stroke: #4F73FF; }
      .greenLine { stroke: #12875A; }
      .title { font: 760 42px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .laneTitle { font: 780 28px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .cardTitle { font: 760 24px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { font: 500 17px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 750 14px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .03em; }
      .mono { font: 720 15px ui-monospace, SFMono-Regular, Menlo, monospace; }
      .tiny { font: 700 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="860" rx="34"/>
  <rect class="paper line" x="30" y="30" width="1340" height="800" rx="28"/>

  <g transform="translate(72 72)">
    <rect x="0" y="0" width="42" height="42" rx="10" fill="#171717"/>
    <rect x="10" y="20" width="5" height="14" rx="2.5" fill="#FFFEFA"/>
    <rect x="19" y="10" width="5" height="24" rx="2.5" fill="#FFFEFA"/>
    <rect x="28" y="25" width="5" height="9" rx="2.5" fill="#FFFEFA"/>
    <text class="title ink" x="62" y="35">Arbiter architecture</text>
    <text class="body muted" x="0" y="74">Agent-paid truth becomes verifiable settlement on Casper.</text>
  </g>

  <g transform="translate(1058 66)">
    <rect x="0" y="0" width="268" height="84" rx="20" fill="#171717"/>
    <text class="small" x="24" y="34" fill="#C9FF3D">LIVE TESTNET PROOF</text>
    <text class="tiny" x="24" y="60" fill="#FFFEFA">deploy -> resolve -> settle</text>
  </g>

  <g transform="translate(72 190)">
    <rect x="0" y="0" width="356" height="500" rx="22" fill="#EDE9DE"/>
    <text class="small muted" x="28" y="42">MARKET INPUT</text>
    <text class="laneTitle ink" x="28" y="78">Stakers fund a pool</text>
    <text class="body muted" x="28" y="112">Users stake CSPR on competing</text>
    <text class="body muted" x="28" y="136">football outcomes.</text>

    <g filter="url(#shadow)">
      <rect class="paper" x="28" y="170" width="300" height="86" rx="16"/>
      <circle cx="70" cy="213" r="18" fill="#5B84FF"/>
      <text class="cardTitle ink" x="106" y="208">Staker A</text>
      <text class="body muted" x="106" y="234">backs HOME</text>
    </g>

    <g filter="url(#shadow)">
      <rect class="paper" x="28" y="282" width="300" height="86" rx="16"/>
      <circle cx="70" cy="325" r="18" fill="#C9FF3D"/>
      <text class="cardTitle ink" x="106" y="320">Staker B</text>
      <text class="body muted" x="106" y="346">backs AWAY</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="28" y="402" width="300" height="72" rx="16" fill="#171717"/>
      <text class="mono" x="54" y="432" fill="#C9FF3D">CSPR escrow pool</text>
      <text class="tiny" x="54" y="456" fill="#FFFEFA">market_id: 0</text>
    </g>
  </g>

  <g transform="translate(522 190)">
    <rect x="0" y="0" width="356" height="500" rx="22" fill="#EAF0FF"/>
    <text class="small muted" x="28" y="42">SURFACE A</text>
    <text class="laneTitle ink" x="28" y="78">Pay for truth</text>
    <text class="body muted" x="28" y="112">The agent pays before reading</text>
    <text class="body muted" x="28" y="136">the verified result.</text>

    <g filter="url(#shadow)">
      <rect class="paper" x="28" y="170" width="300" height="86" rx="16"/>
      <text class="cardTitle ink" x="54" y="208">Arbiter agent</text>
      <text class="body muted" x="54" y="234">perceive -> pay -> reason</text>
    </g>

    <g filter="url(#shadow)">
      <rect class="paper" x="28" y="304" width="300" height="86" rx="16"/>
      <text class="cardTitle ink" x="54" y="342">Truth endpoint</text>
      <text class="body muted" x="54" y="368">HTTP 402 challenge</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="28" y="426" width="300" height="56" rx="16" fill="#5B84FF"/>
      <text class="mono" x="54" y="461" fill="#FFFFFF">x402:rcpt_35bb...</text>
    </g>
  </g>

  <g transform="translate(972 190)">
    <rect x="0" y="0" width="356" height="500" rx="22" fill="#E8F7EE"/>
    <text class="small muted" x="28" y="42">SURFACE B</text>
    <text class="laneTitle ink" x="28" y="78">Settle on Casper</text>
    <text class="body muted" x="28" y="112">The receipt-backed outcome is</text>
    <text class="body muted" x="28" y="136">submitted to the contract.</text>

    <g filter="url(#shadow)">
      <rect class="paper" x="28" y="170" width="300" height="88" rx="16"/>
      <text class="cardTitle ink" x="54" y="208">ArbiterSettlement</text>
      <text class="body muted" x="54" y="234">Odra contract</text>
    </g>

    <g filter="url(#shadow)">
      <rect class="paper" x="28" y="304" width="300" height="82" rx="16"/>
      <text class="cardTitle ink" x="54" y="340">Resolved + settled</text>
      <text class="body muted" x="54" y="366">2% rake applied</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="28" y="424" width="300" height="58" rx="16" fill="#C9FF3D"/>
      <text class="mono ink" x="54" y="460">Winner claims payout</text>
    </g>
  </g>

  <path d="M428 594H500" class="blackLine" stroke-width="4" marker-end="url(#arrowBlack)"/>
  <rect class="paper" x="426" y="556" width="106" height="30" rx="15"/>
  <text class="small muted" x="440" y="577">escrow</text>

  <path d="M700 446V488" class="blueLine" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <rect class="paper" x="718" y="454" width="88" height="30" rx="15"/>
  <text class="small muted" x="733" y="475">402</text>

  <path d="M700 580V612" class="blueLine" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <rect class="paper" x="718" y="584" width="104" height="30" rx="15"/>
  <text class="small muted" x="733" y="605">receipt</text>

  <path d="M878 360H950" class="blueLine" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <rect class="paper" x="842" y="322" width="158" height="30" rx="15"/>
  <text class="small muted" x="858" y="343">submit proof</text>

  <path d="M1150 448V486" class="greenLine" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M1150 576V612" class="greenLine" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <g transform="translate(214 732)">
    <rect x="0" y="0" width="972" height="58" rx="29" fill="#171717"/>
    <text class="mono" x="30" y="36" fill="#C9FF3D">Public proof trail</text>
    <text class="body" x="218" y="37" fill="#FFFEFA">receipt id + contract hash + CSPR.live transactions in the proof viewer</text>
  </g>

  <path d="M672 672C672 708 570 704 570 732" class="blueLine" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M1138 672C1138 710 984 704 984 732" class="greenLine" stroke-width="4" marker-end="url(#arrowGreen)"/>
</svg>
